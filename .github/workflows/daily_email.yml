name: Daily English Email Automation

on:
  schedule:
    # 03:00 UTC = 10:00 sáng giờ Việt Nam (Để test ngay bây giờ)
    - cron: '0 3 * * *'
    # 12:30 UTC = 19:30 tối giờ Việt Nam
    - cron: '30 12 * * *'

  workflow_dispatch:

jobs:
  run-english-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Morning/Test Email
        # Nếu là lịch chạy 03:00 UTC (10h sáng) THÌ chạy lệnh morning
        if: github.event.schedule == '0 3 * * *'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py --morning

      - name: Run Evening Email
        # Nếu là lịch chạy 12:30 UTC (19:30 tối) THÌ chạy lệnh evening
        if: github.event.schedule == '30 12 * * *'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py --evening

      - name: Run Manual (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py --send-now
