name: Daily English Email Automation

on:
  schedule:
    # 00:30 UTC = 07:30 sáng giờ Việt Nam
    - cron: '30 0 * * *'
    # 12:30 UTC = 19:30 tối giờ Việt Nam
    - cron: '30 12 * * *'

  # Kích hoạt thủ công trên GitHub → gửi email tổng hợp ngay để test
  workflow_dispatch:

jobs:
  run-english-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the Morning Email (07:30 VN)
        if: github.event.schedule == '30 0 * * *'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py --morning

      - name: Run the Evening Email (19:30 VN)
        if: github.event.schedule == '30 12 * * *'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py --evening

      - name: Run Combined Email (Manual trigger / Test)
        if: github.event_name == 'workflow_dispatch'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py --send-now
