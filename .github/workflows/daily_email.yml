name: Daily English Email Automation

on:
  schedule:
    # Chạy tự động lúc 00:30 UTC (tương đương 07:30 sáng giờ Việt Nam) mỗi ngày
    - cron: '30 0 * * *'
    
    # Chạy tự động lúc 12:30 UTC (tương đương 19:30 tối giờ Việt Nam) mỗi ngày
    - cron: '30 12 * * *'

  # Cho phép kích hoạt chạy bằng tay (Manual trigger) trên giao diện Github
  workflow_dispatch:

jobs:
  run-english-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Sử dụng cache giúp Github Actions cài đặt siêu nhanh

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the Morning Email
        if: github.event.schedule == '30 0 * * *' || github.event_name == 'workflow_dispatch'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          USE_AI_SUMMARY: "True"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: |
          python main.py --morning

      - name: Run the Evening Email
        if: github.event.schedule == '30 12 * * *' || github.event_name == 'workflow_dispatch'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          USE_AI_SUMMARY: "True"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: |
          python main.py --evening
